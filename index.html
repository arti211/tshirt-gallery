<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our T-shirt Gallery</title>
    <!-- This line connects your CSS file -->
    <link rel="stylesheet" href="/main.css">
</head>

<body>

    <div id="basket-container">
        <span>🛒 Basket: <span id="basket-count">0</span> items</span>
        <span> | Total: £<span id="total-price">0.00</span></span>
        <button onclick="clearBasket()" id="clear-btn">Clear</button>
    </div>


    <h1>Our T-Shirt Collection</h1>

    <div class="gallery">
        <!-- White T-Shirt -->
        <div class="card">
            <img src="media/white_tshirt.jpg" alt="White T-Shirt">
            <h3>Classic White</h3>
            <p>£20.00</p>
            <div class="qty-box">
                Qty: <input type="number" id="qty-white" value="1" min="1" max="10">
            </div>
            <button class="add-btn" onclick="addToBasket('Classic White', 20, 'qty-white')">Add to Basket</button>
        </div>

        <!-- Black T-Shirt -->
        <div class="card">
            <img src="media/black_tshirt.jpg" alt="Black T-Shirt">
            <h3>Midnight Black</h3>
            <p>£25.00</p>
            <div class="qty-box">
                Qty: <input type="number" id="qty-black" value="1" min="1" max="10">
            </div>
            <button class="add-btn" onclick="addToBasket('Midnight Black', 25, 'qty-black')">Add to Basket</button>
        </div>

        <!-- Navy Blue T-Shirt (Fixed Name and IDs) -->
        <div class="card">
            <img src="media/navy_blue_tshirt.jpg" alt="Navy Blue T-Shirt">
            <h3>Navy Blue</h3>
            <p>£22.00</p>
            <div class="qty-box">
                Qty: <input type="number" id="qty-navy" value="1" min="1" max="10">
            </div>
            <button class="add-btn" onclick="addToBasket('Navy Blue', 22, 'qty-navy')">Add to Basket</button>
        </div>
    </div>



    <script>
        let itemCount = 0;
        let totalPrice = 0;

        function addToBasket(name, price, qtyId) {
            // 1. Grab the input element using the passed ID
            const qtyInput = document.getElementById(qtyId);

            // 2. Get the actual number from the input
            const quantity = parseInt(qtyInput.value);

            // 3. Validation
            if (isNaN(quantity) || quantity < 1) {
                alert("Please enter a valid quantity.");
                return;
            }

            const subTotal = price * quantity;

            // 4. Confirmation with Quantity
            let response = confirm(`Add ${quantity}x ${name} to your basket for £${subTotal.toFixed(2)}?`);

            if (response) {
                // Update global math
                itemCount += quantity;
                totalPrice += subTotal;

                // Update the UI
                document.getElementById('basket-count').innerText = itemCount;
                document.getElementById('total-price').innerText = totalPrice.toFixed(2);

                console.log(`Added ${quantity} ${name}. Total items: ${itemCount}`);

                // Reset input to 1
                qtyInput.value = 1;
            }
        }

        function clearBasket() {
            if (itemCount === 0) {
                alert("Your basket is already empty!");
                return;
            }

            if (confirm("Are you sure you want to empty your basket?")) {
                itemCount = 0;
                totalPrice = 0;
                document.getElementById('basket-count').innerText = "0";
                document.getElementById('total-price').innerText = "0.00";
            }
        }
    </script>


</body>

</html>
